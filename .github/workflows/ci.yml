name: Litenyx CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    # Pin to ubuntu-20.04: glibc 2.31 / Boost 1.71 match the Dogecoin Core
    # v1.14.9 era. ubuntu-latest (glibc 2.39 / Boost 1.83) breaks the daemon
    # build (boost::signals2 static_cast; endian.h bswap redefinitions).
    # CI toolchain pin only; no Dogecoin or Litenyx source changed.
    runs-on: ubuntu-20.04
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install build deps (Dogecoin)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libtool autotools-dev automake pkg-config \
            bsdmainutils python3 python3-pip libssl-dev libevent-dev \
            libboost-all-dev \
            libboost-test-dev libboost-thread-dev libboost-chrono-dev \
            libminiupnpc-dev libzmq3-dev libsqlite3-dev libdb++-dev libfmt-dev
          python3 -m pip install --upgrade pip pytest

      - name: Clone Dogecoin base
        working-directory: deploy
        run: make clone-dogecoin

      - name: Inject Litenyx hooks + patches
        working-directory: deploy
        run: make inject-hooks

      - name: Build dogecoind / dogecoin-cli
        working-directory: deploy
        run: |
          set -o pipefail
          make production-build 2>&1 | tee build_diag.log

      - name: Run C++ unit tests (shared-state core)
        working-directory: deploy
        run: make cpp-test

      - name: Run regtest harness (Phase-1+2 mandatory acceptance gate)
        working-directory: deploy
        env:
          LITENYXD_BIN: ${{ github.workspace }}/deploy/external/dogecoin/src/dogecoind
          LITENYX_CLI_BIN: ${{ github.workspace }}/deploy/external/dogecoin/src/dogecoin-cli
          LITENYX_DIAG_DIR: ${{ github.workspace }}
        run: make regtest-test

      - name: Upload regtest diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Litenyx-regtest-diag
          path: |
            litenyx_diag.log
            litenyx_daemon_debug.log

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Litenyx-build-diag
          path: deploy/build_diag.log
